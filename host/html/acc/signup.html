   <div class="email-login">
      <label for="username"> <b>Username</b></label>
      <input class="input-field" id="username" type="text" placeholder="Enter Username" name="username" required>
      <label for="fname"> <b>First Name</b></label>
      <input class="input-field" id="fname" type="text" placeholder="Enter Fisrt Name" name="fname" required>
      <label for="lname"> <b>Last Name</b></label>
      <input class="input-field" id="lname" type="text" placeholder="Enter Last Name" name="lname" required>
      <label for="email"> <b>Email</b></label>
      <input class="input-field" id="email" type="text" placeholder="Enter Email" name="email" required>
      <label for="pswd"><b>Password</b></label>
      <input class="input-field" id="pswd" type="password" placeholder="Enter Password" name="pswd" required>
      <i class="eye icon-pass" id="pswdeye" onclick="showorhidepswd()"></i>
      <p><input type="checkbox" class="remember-field" id="atc"><label for="atc">Agree to Term & conditions</label>
      </p>
   </div>
   <input type="button" class="cta-btn" onclick="createacc()" value="Create Account">

<div style="display:none;" id="accext">
   <div style="display:none;" id="regemail"></div>
   <h2 class="title">OTP</h2>
   <p class="subtitle">Did'nt revieve? <a onclick="regnewotp()"> Request new OTP</a></p>
   <label for="otp"> <b>OTP</b></label>
   <input class="input-field" id="otp" type="text" placeholder="Enter OTP" name="otp" required>
   <input type="button" class="cta-btn" onclick="verifuacc()" value="Verify">
</div>
